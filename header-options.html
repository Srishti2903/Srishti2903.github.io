<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Header color options</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F4EFE4; --paper:#FBF8F1; --ink:#211C18; --oxblood:#420001;
    --forest:#1A3A2A; --border:#E4DDCE; --muted:#8C8275; --rose:#E8A598;
  }
  *{margin:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:#E8E3D7;padding:48px 40px 80px;color:var(--ink);}
  h1.page{font-family:'Fraunces',serif;font-weight:700;font-size:1.9rem;letter-spacing:-0.02em;margin-bottom:6px;}
  p.lead{color:#6E665A;font-size:.95rem;margin-bottom:40px;}
  .grid{display:flex;flex-direction:column;gap:42px;max-width:1080px;}
  .opt-label{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;}
  .opt-label .tag{font-family:'Fraunces',serif;font-weight:700;font-size:1.15rem;}
  .opt-label .hex{font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:#6E665A;}
  .opt-label .note{font-size:.8rem;color:#8C8275;font-style:italic;}
  .frame{border-radius:14px;overflow:hidden;box-shadow:0 10px 34px rgba(26,22,20,.12);border:1px solid rgba(0,0,0,.05);}
  .hero{display:flex;align-items:center;gap:34px;padding:48px 54px;min-height:300px;}
  .htext{flex:0 1 auto;}
  .eyebrow{display:flex;align-items:center;gap:.7rem;font-size:.68rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin-bottom:1rem;}
  .eyebrow::before{content:'';width:1.4rem;height:1px;display:block;}
  .title{font-family:'Fraunces',serif;font-weight:700;font-size:2.7rem;line-height:.96;letter-spacing:-0.035em;white-space:nowrap;}
  .title em{font-style:italic;font-weight:300;}
  .sub{font-family:'Times New Roman',Times,serif;font-size:1rem;line-height:1.7;max-width:30rem;margin-top:1.1rem;}
  .photo{flex:0 0 auto;width:188px;}
  .photo img{width:100%;display:block;filter:drop-shadow(3px 5px 0 rgba(200,192,180,.85)) drop-shadow(0 10px 20px rgba(26,22,20,.22));}
  .spark{width:34px;height:34px;}

  /* ---- palettes ---- */
  .cream  {background:var(--cream);}
  .cream .eyebrow,.cream .sub{color:var(--muted);} .cream .eyebrow::before{background:var(--oxblood);}
  .cream .title{color:var(--ink);} .cream .title em{color:var(--oxblood);}

  .paper  {background:var(--paper);}
  .paper .eyebrow,.paper .sub{color:var(--muted);} .paper .eyebrow::before{background:var(--oxblood);}
  .paper .title{color:var(--ink);} .paper .title em{color:var(--oxblood);}

  .forest {background:var(--forest);}
  .forest .eyebrow{color:rgba(244,239,228,.65);} .forest .eyebrow::before{background:var(--rose);}
  .forest .sub{color:rgba(244,239,228,.8);}
  .forest .title{color:var(--paper);} .forest .title em{color:var(--rose);}

  .oxblood{background:var(--oxblood);}
  .oxblood .eyebrow{color:rgba(244,239,228,.6);} .oxblood .eyebrow::before{background:var(--rose);}
  .oxblood .sub{color:rgba(244,239,228,.78);}
  .oxblood .title{color:var(--paper);} .oxblood .title em{color:var(--rose);}

  .ink    {background:var(--ink);}
  .ink .eyebrow{color:rgba(244,239,228,.55);} .ink .eyebrow::before{background:var(--rose);}
  .ink .sub{color:rgba(244,239,228,.72);}
  .ink .title{color:var(--paper);} .ink .title em{color:var(--rose);}

  .sage   {background:#D7DBCC;}
  .sage .eyebrow,.sage .sub{color:#5E6453;} .sage .eyebrow::before{background:var(--oxblood);}
  .sage .title{color:#26301F;} .sage .title em{color:var(--oxblood);}
</style>
</head>
<body>
  <h1 class="page">Header color options</h1>
  <p class="lead">All drawn from your existing palette. Tell me a letter (or “mix”) and I’ll apply it to the live hero.</p>
  <div class="grid" id="grid"></div>

<script>
  const sticker = 'sticker-cut6.png';
  const star = (c)=>`<svg class="spark" viewBox="0 0 60 60"><path d="M30 6 L34 26 L54 30 L34 34 L30 54 L26 34 L6 30 L26 26 Z" fill="${c}"/></svg>`;
  const opts = [
    {cls:'cream',  tag:'A — Cream',       hex:'#F4EFE4', note:'current', star:'#420001'},
    {cls:'paper',  tag:'B — Warm Paper',  hex:'#FBF8F1', note:'a touch lighter & cleaner', star:'#420001'},
    {cls:'sage',   tag:'C — Soft Sage',   hex:'#D7DBCC', note:'muted green-grey, airy', star:'#420001'},
    {cls:'forest', tag:'D — Forest',      hex:'#1A3A2A', note:'matches the Writing band', star:'#E8A598'},
    {cls:'oxblood',tag:'E — Oxblood',     hex:'#420001', note:'bold, brand red', star:'#E8A598'},
    {cls:'ink',    tag:'F — Ink',         hex:'#211C18', note:'near-black, bookends the footer', star:'#E8A598'},
  ];
  document.getElementById('grid').innerHTML = opts.map(o=>`
    <div>
      <div class="opt-label"><span class="tag">${o.tag}</span><span class="hex">${o.hex}</span><span class="note">${o.note}</span></div>
      <div class="frame">
        <div class="hero ${o.cls}">
          <div class="htext">
            <div class="eyebrow">Srishti Gangolly</div>
            <div class="title">A numbers girl<br>with a <em>creative edge.</em></div>
            <div class="sub">Living at the intersection of data, technology, and marketing. Where insights don't just inform — they build.</div>
          </div>
          <div class="photo" style="position:relative;transform:rotate(3deg);">
            <img src="${sticker}" alt="">
            <div style="position:absolute;top:-18px;right:-10px;">${star(o.star)}</div>
          </div>
        </div>
      </div>
    </div>`).join('');
</script>
</body>
</html>
